name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Validate version consistency
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          TAURI_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "Tag: $TAG | package.json: $PKG_VER | tauri.conf.json: $TAURI_VER"
          if [ "$TAG" != "$PKG_VER" ] || [ "$TAG" != "$TAURI_VER" ]; then
            echo "::error::Version mismatch! Tag=$TAG package.json=$PKG_VER tauri.conf.json=$TAURI_VER"
            exit 1
          fi
          echo "Versions match: $TAG"

      - name: Build Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SPICA TIDE ${{ github.ref_name }}'
          releaseBody: |
            ## SPICA TIDE Deck Cargo Planner ${{ github.ref_name }}

            ### Update
            Running installations will automatically detect this update.
          releaseDraft: false
          prerelease: false
          args: --verbose --target x86_64-pc-windows-msvc

      - name: Upload build logs on failure
        if: failure()
        shell: bash
        run: |
          echo "=== Tauri build log ==="
          cat src-tauri/target/x86_64-pc-windows-msvc/release/.cargo-lock 2>/dev/null || echo "No cargo lock"
          echo "=== Last 100 lines of any build log ==="
          find src-tauri/target -name "*.log" -exec tail -50 {} \; 2>/dev/null || echo "No log files found"
          echo "=== NSIS output ==="
          find src-tauri/target -name "nsis-output*" -exec cat {} \; 2>/dev/null || echo "No NSIS output"
          echo "=== dist/ contents ==="
          ls -la dist/ 2>/dev/null || echo "dist/ directory missing!"
          echo "=== Bundle output ==="
          find src-tauri/target -path "*/release/bundle/*" -type f 2>/dev/null || echo "No bundle output found"
