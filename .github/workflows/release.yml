name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Validate version consistency
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          TAURI_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "Tag: $TAG | package.json: $PKG_VER | tauri.conf.json: $TAURI_VER"
          if [ "$TAG" != "$PKG_VER" ] || [ "$TAG" != "$TAURI_VER" ]; then
            echo "::error::Version mismatch! Tag=$TAG package.json=$PKG_VER tauri.conf.json=$TAURI_VER"
            exit 1
          fi
          echo "Versions match: $TAG"

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --verbose --target x86_64-pc-windows-msvc

      - name: Locate build artifacts
        id: artifacts
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis"
          echo "=== Bundle directory ==="
          ls -la "$BUNDLE_DIR"

          NSIS_ZIP=$(find "$BUNDLE_DIR" -name "*.nsis.zip" | head -1)
          NSIS_SIG=$(find "$BUNDLE_DIR" -name "*.nsis.zip.sig" | head -1)
          EXE=$(find "$BUNDLE_DIR" -name "*.exe" ! -name "*.nsis.*" | head -1)
          EXE_SIG=$(find "$BUNDLE_DIR" -name "*.exe.sig" | head -1)

          echo "NSIS_ZIP=$NSIS_ZIP" >> $GITHUB_OUTPUT
          echo "NSIS_SIG=$NSIS_SIG" >> $GITHUB_OUTPUT
          echo "EXE=$EXE" >> $GITHUB_OUTPUT
          echo "EXE_SIG=$EXE_SIG" >> $GITHUB_OUTPUT

          NSIS_ZIP_NAME=$(basename "$NSIS_ZIP")
          EXE_NAME=$(basename "$EXE")
          echo "NSIS_ZIP_NAME=$NSIS_ZIP_NAME" >> $GITHUB_OUTPUT
          echo "EXE_NAME=$EXE_NAME" >> $GITHUB_OUTPUT

          echo "Installer: $EXE_NAME"
          echo "Updater bundle: $NSIS_ZIP_NAME"

      - name: Build latest.json
        id: manifest
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NSIS_SIG_FILE="${{ steps.artifacts.outputs.NSIS_SIG }}"
          NSIS_ZIP_NAME="${{ steps.artifacts.outputs.NSIS_ZIP_NAME }}"
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"

          SIG=$(cat "$NSIS_SIG_FILE")
          URL="https://github.com/${REPO}/releases/download/${TAG}/${NSIS_ZIP_NAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          cat > latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "SPICA TIDE ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64-nsis": {
                "signature": "${SIG}",
                "url": "${URL}"
              }
            }
          }
          ENDJSON

          echo "=== Generated latest.json ==="
          cat latest.json
          echo ""

          # Validate JSON
          node -e "JSON.parse(require('fs').readFileSync('latest.json','utf8')); console.log('JSON valid')"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"

          gh release create "$TAG" \
            --title "SPICA TIDE $TAG" \
            --notes "## SPICA TIDE Deck Cargo Planner $TAG

          ### Update
          Running installations will automatically detect this update." \
            "${{ steps.artifacts.outputs.EXE }}" \
            "${{ steps.artifacts.outputs.EXE_SIG }}" \
            "${{ steps.artifacts.outputs.NSIS_ZIP }}" \
            "${{ steps.artifacts.outputs.NSIS_SIG }}" \
            latest.json \
            --latest

      - name: Verify release
        shell: bash
        run: |
          echo "=== Release assets ==="
          gh release view ${{ github.ref_name }} --json assets --jq '.assets[].name'
          echo ""
          echo "=== latest.json content ==="
          cat latest.json

      - name: Upload build logs on failure
        if: failure()
        shell: bash
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/ 2>/dev/null || echo "dist/ directory missing!"
          echo "=== Bundle output ==="
          find src-tauri/target -path "*/release/bundle/*" -type f 2>/dev/null || echo "No bundle output found"
          echo "=== Cargo build errors ==="
          find src-tauri/target -name "*.stderr" -exec cat {} \; 2>/dev/null || true
