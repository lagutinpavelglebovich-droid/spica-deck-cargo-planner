name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Validate version consistency
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          TAURI_VER=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "Tag: $TAG | package.json: $PKG_VER | tauri.conf.json: $TAURI_VER"
          if [ "$TAG" != "$PKG_VER" ] || [ "$TAG" != "$TAURI_VER" ]; then
            echo "::error::Version mismatch! Tag=$TAG package.json=$PKG_VER tauri.conf.json=$TAURI_VER"
            exit 1
          fi
          echo "Versions match: $TAG"

      - name: Build Tauri app
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --verbose --target x86_64-pc-windows-msvc

      - name: Locate build artifacts
        id: artifacts
        shell: bash
        run: |
          TARGET_DIR="src-tauri/target"

          echo "=== Searching entire target tree for bundle artifacts ==="
          echo ""
          echo "--- All .exe files ---"
          find "$TARGET_DIR" -name "*.exe" -path "*/bundle/*" 2>/dev/null || echo "(none)"
          echo ""
          echo "--- All .nsis.zip files ---"
          find "$TARGET_DIR" -name "*.nsis.zip" 2>/dev/null || echo "(none)"
          echo ""
          echo "--- All .nsis.zip.sig files ---"
          find "$TARGET_DIR" -name "*.nsis.zip.sig" 2>/dev/null || echo "(none)"
          echo ""
          echo "--- All .sig files ---"
          find "$TARGET_DIR" -name "*.sig" 2>/dev/null || echo "(none)"
          echo ""
          echo "--- All bundle directories ---"
          find "$TARGET_DIR" -type d -name "bundle" 2>/dev/null | while read d; do
            echo "  $d:"
            ls -la "$d"/ 2>/dev/null
            for sub in "$d"/*/; do
              [ -d "$sub" ] && echo "    $(basename "$sub"):" && ls -la "$sub" 2>/dev/null
            done
          done
          echo ""

          # Search entire target tree — not just one hardcoded path
          EXE=$(find "$TARGET_DIR" -name "*setup*.exe" -path "*/bundle/nsis/*" ! -name "*.nsis.*" 2>/dev/null | head -1)
          NSIS_ZIP=$(find "$TARGET_DIR" -name "*.nsis.zip" 2>/dev/null | head -1)
          NSIS_SIG=$(find "$TARGET_DIR" -name "*.nsis.zip.sig" 2>/dev/null | head -1)

          echo "Resolved: EXE=$EXE"
          echo "Resolved: NSIS_ZIP=$NSIS_ZIP"
          echo "Resolved: NSIS_SIG=$NSIS_SIG"

          if [ -z "$EXE" ]; then
            echo "::error::No installer .exe found anywhere in target tree"
            exit 1
          fi
          if [ -z "$NSIS_ZIP" ]; then
            echo "::warning::No .nsis.zip found — updater bundle not generated"
            echo "::warning::TAURI_SIGNING_PRIVATE_KEY length: ${#TAURI_SIGNING_PRIVATE_KEY}"
          fi
          if [ -z "$NSIS_SIG" ]; then
            echo "::warning::No .nsis.zip.sig found — signing did not produce signature"
          fi

          echo "NSIS_ZIP=$NSIS_ZIP" >> $GITHUB_OUTPUT
          echo "NSIS_SIG=$NSIS_SIG" >> $GITHUB_OUTPUT
          echo "EXE=$EXE" >> $GITHUB_OUTPUT

          NSIS_ZIP_NAME=$(basename "$NSIS_ZIP" 2>/dev/null || echo "")
          EXE_NAME=$(basename "$EXE" 2>/dev/null || echo "")
          echo "NSIS_ZIP_NAME=$NSIS_ZIP_NAME" >> $GITHUB_OUTPUT
          echo "EXE_NAME=$EXE_NAME" >> $GITHUB_OUTPUT

          echo "Installer: $EXE_NAME"
          echo "Updater bundle: $NSIS_ZIP_NAME"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Build latest.json
        id: manifest
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NSIS_SIG_FILE="${{ steps.artifacts.outputs.NSIS_SIG }}"
          NSIS_ZIP_NAME="${{ steps.artifacts.outputs.NSIS_ZIP_NAME }}"
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"

          # Validate required artifacts exist
          if [ -z "$NSIS_SIG_FILE" ] || [ ! -f "$NSIS_SIG_FILE" ]; then
            echo "::error::NSIS signature file not found: '$NSIS_SIG_FILE'"
            echo "Updater artifacts may not have been generated."
            echo "Check that TAURI_SIGNING_PRIVATE_KEY secret is set and createUpdaterArtifacts is true."
            exit 1
          fi
          if [ -z "$NSIS_ZIP_NAME" ]; then
            echo "::error::NSIS zip filename is empty — artifact discovery failed"
            exit 1
          fi

          # Read signature — strip whitespace/newlines to keep JSON safe
          SIG=$(tr -d '\n\r ' < "$NSIS_SIG_FILE")
          if [ -z "$SIG" ]; then
            echo "::error::Signature file is empty: $NSIS_SIG_FILE"
            exit 1
          fi

          ENCODED_NAME=$(python -c "import urllib.parse; print(urllib.parse.quote('${NSIS_ZIP_NAME}'))")
          URL="https://github.com/${REPO}/releases/download/${TAG}/${ENCODED_NAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Generate JSON with node to avoid heredoc quoting issues
          node -e "
            const j = {
              version: '${VERSION}',
              notes: 'SPICA TIDE ${TAG}',
              pub_date: '${PUB_DATE}',
              platforms: {
                'windows-x86_64': {
                  signature: process.argv[1],
                  url: '${URL}'
                }
              }
            };
            require('fs').writeFileSync('latest.json', JSON.stringify(j, null, 2));
            console.log('latest.json written');
          " "$SIG"

          echo "=== Generated latest.json ==="
          cat latest.json

          # Validate JSON parses correctly
          node -e "JSON.parse(require('fs').readFileSync('latest.json','utf8')); console.log('JSON valid')"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"

          gh release create "$TAG" \
            --title "SPICA TIDE $TAG" \
            --notes "## SPICA TIDE Deck Cargo Planner $TAG

          ### Update
          Running installations will automatically detect this update." \
            "${{ steps.artifacts.outputs.EXE }}" \
            "${{ steps.artifacts.outputs.NSIS_ZIP }}" \
            "${{ steps.artifacts.outputs.NSIS_SIG }}" \
            latest.json \
            --latest

      - name: Verify release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "=== Release assets ==="
          gh release view ${{ github.ref_name }} --json assets --jq '.assets[].name'
          echo ""
          echo "=== latest.json content ==="
          cat latest.json

      - name: Upload build logs on failure
        if: failure()
        shell: bash
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/ 2>/dev/null || echo "dist/ directory missing!"
          echo "=== Bundle output ==="
          find src-tauri/target -path "*/release/bundle/*" -type f 2>/dev/null || echo "No bundle output found"
          echo "=== Cargo build errors ==="
          find src-tauri/target -name "*.stderr" -exec cat {} \; 2>/dev/null || true
