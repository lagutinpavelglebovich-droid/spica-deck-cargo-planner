<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#26446E"/>
      <stop offset="100%" stop-color="#111E34"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#3A6AAA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3A6AAA" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="7" stdDeviation="10"
                    flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <rect width="512" height="512" rx="100" ry="100" fill="url(#glow)"/>

  <!-- Cable -->
  <rect x="252" y="52" width="8" height="90" rx="4" fill="#FFFFFF" opacity="0.92"/>

  <!-- Pulley -->
  <circle cx="256" cy="46" r="16"
          fill="none" stroke="#FFFFFF" stroke-width="7" opacity="0.92"/>
  <circle cx="256" cy="46" r="4.5" fill="#FFFFFF" opacity="0.65"/>

  <!-- Spreader beam -->
  <rect x="108" y="142" width="296" height="14" rx="7"
        fill="#FFFFFF" opacity="0.95"/>

  <!-- Slings -->
  <rect x="138" y="156" width="7" height="34" rx="3.5" fill="#FFFFFF" opacity="0.88"/>
  <rect x="367" y="156" width="7" height="34" rx="3.5" fill="#FFFFFF" opacity="0.88"/>

  <!-- Container -->
  <g filter="url(#shadow)">
    <!-- Body -->
    <rect x="112" y="188" width="288" height="176" rx="6"
          fill="#FFFFFF" opacity="0.96"/>

    <!-- Door split -->
    <rect x="254" y="200" width="4" height="152" fill="#1A2E48" opacity="0.18"/>

    <!-- Mid rail -->
    <rect x="112" y="274" width="288" height="4" fill="#1A2E48" opacity="0.14"/>

    <!-- Corrugations left -->
    <rect x="148" y="200" width="2.5" height="152" fill="#1A2E48" opacity="0.10"/>
    <rect x="184" y="200" width="2.5" height="152" fill="#1A2E48" opacity="0.10"/>
    <rect x="220" y="200" width="2.5" height="152" fill="#1A2E48" opacity="0.10"/>

    <!-- Corrugations right -->
    <rect x="292" y="200" width="2.5" height="152" fill="#1A2E48" opacity="0.10"/>
    <rect x="328" y="200" width="2.5" height="152" fill="#1A2E48" opacity="0.10"/>
    <rect x="364" y="200" width="2.5" height="152" fill="#1A2E48" opacity="0.10"/>

    <!-- Top edge highlight -->
    <rect x="112" y="188" width="288" height="7" rx="4"
          fill="#FFFFFF" opacity="0.55"/>

    <!-- Corner castings -->
    <rect x="105" y="182" width="26" height="18" rx="5" fill="#FFFFFF" opacity="0.92"/>
    <rect x="381" y="182" width="26" height="18" rx="5" fill="#FFFFFF" opacity="0.92"/>
    <rect x="105" y="358" width="26" height="18" rx="5" fill="#FFFFFF" opacity="0.92"/>
    <rect x="381" y="358" width="26" height="18" rx="5" fill="#FFFFFF" opacity="0.92"/>

    <!-- Casting holes -->
    <circle cx="118" cy="191" r="5" fill="#1A2E48" opacity="0.35"/>
    <circle cx="394" cy="191" r="5" fill="#1A2E48" opacity="0.35"/>
    <circle cx="118" cy="367" r="5" fill="#1A2E48" opacity="0.35"/>
    <circle cx="394" cy="367" r="5" fill="#1A2E48" opacity="0.35"/>

    <!-- Door handles -->
    <rect x="228" y="266" width="18" height="7" rx="3.5" fill="#1A2E48" opacity="0.22"/>
    <rect x="266" y="266" width="18" height="7" rx="3.5" fill="#1A2E48" opacity="0.22"/>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="256" cy="380" rx="118" ry="8"
           fill="#000000" opacity="0.22"/>

  <!-- Border -->
  <rect x="1.5" y="1.5" width="509" height="509" rx="99" ry="99"
        fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.08"/>
</svg>
